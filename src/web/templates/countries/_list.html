{% if countries %}
<table>
  <thead>
    <tr>
      <th>Flag</th>
      <th>Name</th>
      <th>Code</th>
      <th>Region</th>
    </tr>
  </thead>
  <tbody>
    {% for c in countries %}
    <tr>
      <td>{{ c.flag }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.code }}</td>
      <td>{{ c.subregion.region.name if c.subregion else "—" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p>No countries found.</p>
{% endif %}
