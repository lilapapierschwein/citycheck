{% extends "base.html" %}
{% block title %}Countries | citycheck{% endblock %}
{% block content %}
<h1>Countries</h1>
<input
  type="search"
  name="q"
  placeholder="Search countries…"
  hx-get="/countries"
  hx-trigger="input changed delay:300ms"
  hx-target="#country-list"
  hx-include="[name='q']"
>
<div id="country-list">
  {% include "countries/_list.html" %}
</div>
{% endblock %}
